<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trading - Positions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e0e0e0;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { margin-bottom: 10px; color: #fff; }
        .timestamp { color: #888; font-size: 13px; margin-bottom: 20px; }

        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a1f26;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
        }
        .stat-label { color: #888; font-size: 12px; }
        .stat-value { font-size: 24px; font-weight: bold; margin-top: 8px; color: #00ff00; }
        .stat-value.red { color: #ff4444; }
        .stat-value.neutral { color: #e0e0e0; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1f26;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }
        thead {
            background: #252d35;
        }
        th {
            padding: 12px;
            text-align: left;
            color: #fff;
            font-weight: 600;
            border-bottom: 1px solid #333;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #2a2f35;
        }
        tr:hover { background: #222a31; }

        .symbol { font-weight: 600; color: #00ff00; }
        .gain { color: #00ff00; }
        .loss { color: #ff4444; }
        .neutral { color: #e0e0e0; }

        .refresh-btn {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .refresh-btn:hover { background: #00dd00; }

        .loading { color: #888; }
        .error { color: #ff4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AI Trading Platform</h1>
        <p class="timestamp" id="timestamp">Loading...</p>

        <button class="refresh-btn" onclick="loadData()">🔄 Refresh Now</button>

        <div class="summary" id="summary">
            <div class="stat-card">
                <div class="stat-label">Open Positions</div>
                <div class="stat-value" id="openPos">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Position Value</div>
                <div class="stat-value" id="posValue">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Unrealized P&L</div>
                <div class="stat-value" id="unrealPnl">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Return %</div>
                <div class="stat-value" id="returnPct">-</div>
            </div>
        </div>

        <h2 style="margin-bottom: 15px;">Open Positions (Latest First)</h2>
        <table id="positionsTable">
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Shares</th>
                    <th>Entry Price</th>
                    <th>Current</th>
                    <th>Entry Time</th>
                    <th>Entry %</th>
                    <th>Unrealized P&L</th>
                    <th>P&L %</th>
                    <th>Position Value</th>
                </tr>
            </thead>
            <tbody id="positionsBody">
                <tr><td colspan="9" class="loading">Loading positions...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const CSVPath = '/Users/teaganpeer/dev/ai-trading-platform/trades_';

        async function loadData() {
            try {
                // Get latest CSV file
                const response = await fetch('get_latest_positions.json');
                if (!response.ok) throw new Error('Failed to load positions');

                const data = await response.json();

                // Update timestamp
                document.getElementById('timestamp').textContent =
                    `Last updated: ${new Date(data.timestamp).toLocaleString()}`;

                // Update summary stats
                document.getElementById('openPos').textContent = data.openPositions;
                document.getElementById('posValue').textContent =
                    `$${parseFloat(data.positionValue).toLocaleString('en-US', {minimumFractionDigits: 2})}`;

                const unrealPnl = parseFloat(data.unrealizedPnl);
                const unrealPnlEl = document.getElementById('unrealPnl');
                unrealPnlEl.textContent = `${unrealPnl >= 0 ? '+' : ''}$${unrealPnl.toFixed(2)}`;
                unrealPnlEl.className = `stat-value ${unrealPnl > 0 ? 'gain' : unrealPnl < 0 ? 'loss' : 'neutral'}`;

                const returnPct = parseFloat(data.totalReturnPct);
                const returnEl = document.getElementById('returnPct');
                returnEl.textContent = `${returnPct >= 0 ? '+' : ''}${returnPct.toFixed(2)}%`;
                returnEl.className = `stat-value ${returnPct > 0 ? 'gain' : returnPct < 0 ? 'loss' : 'neutral'}`;

                // Update positions table
                const tbody = document.getElementById('positionsBody');
                tbody.innerHTML = '';

                if (data.positions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" class="neutral">No open positions</td></tr>';
                } else {
                    data.positions.forEach(pos => {
                        const pnl = parseFloat(pos.unrealizedPnl);
                        const pnlPct = parseFloat(pos.pnlPct);
                        const pnlClass = pnl > 0 ? 'gain' : pnl < 0 ? 'loss' : 'neutral';

                        const row = `
                            <tr>
                                <td class="symbol">${pos.symbol}</td>
                                <td>${parseFloat(pos.shares).toFixed(2)}</td>
                                <td>$${parseFloat(pos.entryPrice).toFixed(2)}</td>
                                <td>$${parseFloat(pos.currentPrice).toFixed(2)}</td>
                                <td>${pos.entryTime}</td>
                                <td>${pos.entryConfidence}</td>
                                <td class="${pnlClass}">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</td>
                                <td class="${pnlClass}">${pnlPct >= 0 ? '+' : ''}${pnlPct.toFixed(2)}%</td>
                                <td>$${parseFloat(pos.positionValue).toLocaleString('en-US', {minimumFractionDigits: 2})}</td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                }

            } catch (error) {
                document.getElementById('positionsBody').innerHTML =
                    `<tr><td colspan="9" class="error">Error loading data: ${error.message}</td></tr>`;
            }
        }

        // Auto-refresh every 30 seconds
        setInterval(loadData, 30000);

        // Load on page load
        window.addEventListener('load', loadData);
    </script>
</body>
</html>
